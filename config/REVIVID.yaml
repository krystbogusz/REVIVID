# REVIVID configuration — Unified Masked Frame Prediction model.
#
# One diffusion network handles all three tasks simultaneously:
#   1. Restoration  — remove degradations (scratches, noise, blur, compression)
#   2. SR           — 4× super-resolution via PixelShuffle in the backbone
#   3. VFI          — generate masked intermediate frames (temporal inpainting)
#
# Persistent spatial holes (baked by DatasetCreator for test clips and a fraction
# of train clips) are detected on-the-fly from the LQ fill value (-1.0) and fed
# as an explicit conditioning channel to the single refine UNet.
#
# ============================================================================ #
# CURRICULUM — training from scratch in two phases (this file = PHASE 1)
# ---------------------------------------------------------------------------- #
# PHASE 1 (ACTIVE): restoration + SR only.
#   * holes OFF  (model.hole_prob = 0.0, loss_weights.detect = 0.0)
#   * VFI   OFF  (model.vfi_prob  = 0.0, loss_weights.vfi    = 0.0)
#   Trains the backbone + diffusion head on degraded->clean HR pairs.
#
# PHASE 2 (later): add inpainting of large holes + VFI, resuming PHASE 1 weights.
#   Flip the values marked "PHASE 2" below, keep training (latest.pth is resumed
#   automatically). No dataset regeneration needed — holes/VFI are applied
#   on-the-fly by the DataLoader from these probabilities.
# ============================================================================ #
#
# Data locations are fixed by the pipeline and NOT configured here:
#   sources.yaml → downloader → data/raw/
#   data/raw/    → dataset_creator → data/training/{train,valid,test}/{degraded,gt}

seed: 2026

# --------------------------------------------------------------------------- #
# Model architecture
# --------------------------------------------------------------------------- #
model:
  # Recurrent conditioning backbone (MambaOFR-inspired)
  num_feat: 16            # propagation feature channels
  num_block: 6            # SSM blocks per propagation branch
  embed_dim: 64           # internal width of SSM blocks
  cond_dim: 64            # conditioning features fed to the diffusion head
  d_state: 16             # SSM state dimension
  ssm_expand: 2           # SSM inner expansion factor
  # RAFT optical flow is always frozen — no fine-tuning parameter exists

  # Super-resolution upscale factor in the backbone (PixelShuffle)
  # and LR downscale factor for dataset generation.
  # Powers of two only: 1 (no SR), 2 (2×), 4 (4×).
  sr_scale: 4

  # Single unified diffusion UNet (no attn — Mamba backbone provides global context)
  refiner_base: 64
  channel_mult: [1, 2, 4]
  num_res_blocks: 2
  mask_embed_dim: 16      # dim of temporal frame-mask embedding fed to UNet

  # Diffusion process
  num_timesteps: 1000
  schedule: cosine
  refine_steps: 8         # DDIM steps at inference

  # Spatial hole detection (inference only — training uses on-the-fly threshold)
  hole_threshold: 0.5

  # VFI — temporal masked frame prediction (on-the-fly in DataLoader)
  vfi_prob: 0.0           # PHASE 1: OFF. PHASE 2: 0.5 (prob a clip has ≥1 masked frames)
  vfi_mask_ratio: 0.3     # max fraction of inner frames that may be masked (PHASE 2)

  # Persistent spatial holes (baked per window by DatasetCreator / DataLoader)
  hole_prob: 0.0          # PHASE 1: OFF. PHASE 2: 0.2 (prob a window has holes burned in)

# --------------------------------------------------------------------------- #
# Training
# --------------------------------------------------------------------------- #
training:
  epochs: 2000
  batch_size: 1
  num_frame: 7

  # Random GT crop for training (LR crop = patch_size / sr_scale).
  patch_size: 400

  lr: 0.0002              # constant learning rate (no scheduler)
  beta1: 0.9
  beta2: 0.99

  use_perceptual: true
  use_amp: false

  loss_weights:
    pix: 1.0              # Charbonnier on coarse restoration (backbone)
    perceptual: 0.1       # VGG perceptual on coarse
    detect: 0.0           # PHASE 1: OFF (no holes). PHASE 2: 0.05 — BCE on hole_head
    v: 1.0                # v-prediction diffusion loss (restoration + SR now, + VFI/inpaint later)
    vfi: 0.0              # PHASE 1: OFF. PHASE 2: 0.05+ — targeted Charbonnier on masked frames
    # Sharpness losses on the FINAL refined output (coarse + predicted residual):
    refine_perceptual: 0.1 # VGG perceptual on refined
    refine_fft: 0.5        # frequency-domain loss on refined (recover fine texture)
    refine_grad: 0.5       # Sobel gradient loss on refined (crisp edges)
  refine_snr_weight: true  # scale refined losses by alphas_cumprod[t] (down-weight noisy x0_pred)

  num_workers: 10

  # On-the-fly degradation (textures cached once per DataLoader worker).
  # Default directory: data/raw/noise_data
  use_flip: true
  use_rot: true

# --------------------------------------------------------------------------- #
# Validation / logging
# --------------------------------------------------------------------------- #
validation:
  # NOTE: this is a diffusion model — each validation window costs `refine_steps`
  # DDIM forward passes, so full-resolution validation every epoch is very slow.
  # The knobs below trade a bit of metric fidelity for a big speedup.

  # HR crop for validation (center crop). 0 = full frames — DDIM at native
  # REDS resolution (~1280×720) is very slow / may OOM. A crop is MUCH faster.
  patch_size: 400        # e.g. 256; set 0 for full-frame validation

  val_every: 10          # run validation every N epochs (1 = every epoch)
  max_clips: 0           # cap number of validation clips (0 = all)
  max_frames: 35          # cap frames evaluated per clip (0 = all)
  refine_steps: 0        # DDIM steps during validation (0 = model default, e.g. 8)
  num_workers: 5         # DataLoader workers for validation (0 = main process)

logging:
  log_every: 120
  exp_dir: ./experiments/revivid
  save_checkpoint_every: 100   # numbered + latest checkpoints (not every epoch)
