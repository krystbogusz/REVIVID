seed: 2026
model:
  num_feat: 16
  num_block: 6
  embed_dim: 64
  cond_dim: 64
  d_state: 16
  ssm_expand: 2
  sr_scale: 4
  refiner_base: 64
  channel_mult:
  - 1
  - 2
  - 4
  num_res_blocks: 2
  mask_embed_dim: 16
  num_timesteps: 1000
  schedule: cosine
  refine_steps: 8
  hole_threshold: 0.5
  vfi_prob: 0.0
  vfi_mask_ratio: 0.3
  hole_prob: 0.0
training:
  epochs: 2000
  batch_size: 1
  num_frame: 7
  patch_size: 400
  lr: 0.0002
  beta1: 0.9
  beta2: 0.99
  scheduler:
    type: cosine
    warmup_epochs: 20
    eta_min: 1.0e-06
    step_size: 1000
    gamma: 0.5
    factor: 0.5
    patience: 50
  use_perceptual: true
  use_amp: false
  loss_weights:
    pix: 1.0
    perceptual: 0.1
    detect: 0.0
    v: 1.0
    fft: 1.0
    vfi: 0.0
  num_workers: 10
  use_flip: true
  use_rot: true
validation:
  patch_size: 400
  val_every: 10
  max_clips: 0
  max_frames: 35
  refine_steps: 0
  num_workers: 5
logging:
  log_every: 120
  exp_dir: ./experiments/revivid
  save_checkpoint_every: 100
